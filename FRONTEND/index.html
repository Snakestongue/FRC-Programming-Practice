<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRC Programming Practice</title>
    <link rel="icon" href="public/image.png" />
  </head>
  <body>
    <!-- <p>hi</p> -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      async function saveNumber(){
        let savedNumber = localStorage.getItem("teamNumber")
        if (savedNumber){
          return;
        }
        let number;
        while (!number){
          number = Number(prompt("Please enter your robotics team number!"));
          if(!number){
              alert("Please enter a team number!");
          }
        }
        try {
          const response = await fetch("https://frc-programming-practice.onrender.com/alert",{
              method: "POST",
              headers: {"Content-Type": "application/json" },
              body:JSON.stringify({
                  numReq: number
              })
          });
          const wait =await response.json()
          if (response.ok){
              alert("Thank you!");
              localStorage.setItem("teamNumber", number);

          }else{
              alert("Failed: " + wait.message);
          }
        } catch (error){
          alert(error)
        }
      }
      saveNumber()
    </script>
  </body>
</html>
